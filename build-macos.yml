name: Build macOS Tcl Runtime

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Install build tools
      run: |
        brew update
        brew install wget

    - name: Set variables
      run: |
        echo "PREFIX=$HOME/tclbuild" >> $GITHUB_ENV

    - name: Build Tcl/Tk
      run: |
        mkdir -p $PREFIX
        cd /tmp

        wget https://prdownloads.sourceforge.net/tcl/tcl8.6.13-src.tar.gz
        tar xzf tcl8.6.13-src.tar.gz
        cd tcl8.6.13/unix
        ./configure --prefix=$PREFIX
        make -j4
        make install

        cd /tmp
        wget https://prdownloads.sourceforge.net/tcl/tk8.6.13-src.tar.gz
        tar xzf tk8.6.13-src.tar.gz
        cd tk8.6.13/unix
        ./configure --prefix=$PREFIX --with-tcl=$PREFIX/lib
        make -j4
        make install

    - name: Build Itcl
      run: |
        cd /tmp
        wget https://prdownloads.sourceforge.net/itcl/itcl4.2.3.tar.gz
        tar xzf itcl4.2.3.tar.gz
        cd itcl4.2.3
        ./configure --prefix=$PREFIX --with-tcl=$PREFIX/lib
        make -j4
        make install

    - name: Build Itk
      run: |
        cd /tmp
        wget https://prdownloads.sourceforge.net/itcl/itk4.1.0.tar.gz
        tar xzf itk4.1.0.tar.gz
        cd itk4.1.0
        ./configure --prefix=$PREFIX --with-tcl=$PREFIX/lib
        make -j4
        make install

    - name: Install Iwidgets (pure Tcl)
      run: |
        cd /tmp
        wget https://sourceforge.net/projects/incrtcl/files/Iwidgets/4.1.1/iwidgets4.1.1.tar.gz
        tar xzf iwidgets4.1.1.tar.gz
        cp -r iwidgets4.1.1 $PREFIX/lib/

    - name: Build Img
      run: |
        cd /tmp
        wget https://sourceforge.net/projects/tkimg/files/tkimg/1.4.14/Img-1.4.14.tar.gz
        tar xzf Img-1.4.14.tar.gz
        cd Img-1.4.14
        ./configure --prefix=$PREFIX --with-tcl=$PREFIX/lib
        make -j4
        make install

    - name: Package runtime
      run: |
        cd $HOME
        tar czf macos-tcl-runtime.tar.gz tclbuild

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: macos-runtime
        path: ~/macos-tcl-runtime.tar.gz
	